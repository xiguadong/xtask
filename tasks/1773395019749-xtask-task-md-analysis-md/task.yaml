id: 1773395019749-xtask-task-md-analysis-md
title: xtask页可以分栏展示task.md和analysis.md
description: >-
  重新梳理 workflows:

  1. 每次进入终端时先通过xtask cli命令， 获取当前xtask任务

  2. 创建分支后，自动在对应分支生成空的 task.md analysis.md ，比如 cache目录下;

  3. xtask详情页可以展示 task.md / analysis.md 的详情；

  4. xtask cli支持更新 task.md 和 analysis.md 的功能，task.md/analysis.md 在完成当前任务后，xtask
  支持拷贝 task.md/analysis.md到ref-xtask分支中
